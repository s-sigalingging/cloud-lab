apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bank-app
  namespace: argocd 
  finalizers:
    - resources-finalizer.argocd.argoproj.io # Deletes resources from GKE if you delete the app
spec:
  project: default
  source:
    # REPLACE THIS with your actual GitHub repository URL:
    repoURL: 'https://github.com/s-sigalingging/cloud-lab.git'
    targetRevision: main
    path: 'kubernetes-manifests' 
  destination:
    server: 'https://kubernetes.default.svc' 
    namespace: app 
  syncPolicy:
    automated:
      prune: true     
      selfHeal: true  
    syncOptions:
      - CreateNamespace=true

---
apiVersion: v1
kind: Service
metadata:
  name: argocd-server-lb
  namespace: argocd 
  annotations:
    cloud.google.com/load-balancer-type: "Internal"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: argocd-server
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
    - name: https
      protocol: TCP
      port: 443
      targetPort: 8080      