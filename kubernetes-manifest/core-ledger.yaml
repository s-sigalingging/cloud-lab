apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-ledger
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: core-ledger
  template:
    metadata:
      labels:
        app: core-ledger
    spec:
      containers:
      - name: ledger
        image: asia-southeast2-docker.pkg.dev/project-3ad3e57a-ebe0-4fe5-b00/lab-images/banking:latest
        imagePullPolicy: Always
        command: ["/bin/sh", "-c"]
        args:
        - |
          sed -i '1s/^/import json\n/' $APP_SCRIPT;
          python3 $APP_SCRIPT;
        resources:
          requests:
            cpu: "20m"       
            memory: "64Mi"   
          limits:
            cpu: "100m"     
            memory: "128Mi"
        volumeMounts:
        - name: secrets-store-inline
          mountPath: "/var/secrets"
          readOnly: true
        ports:
        - containerPort: 8082
        env:
        - name: APP_SCRIPT
          value: "core-ledger.py"  
      volumes:
      - name: secrets-store-inline
        csi:
          driver: secrets-store-gke.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "app-secrets-provider"

---
apiVersion: v1
kind: Service
metadata:
  name: core-ledger-service
  namespace: app
spec:
  type: ClusterIP
  ports:
  - port: 8082
    targetPort: 8082
  selector:
    app: core-ledger