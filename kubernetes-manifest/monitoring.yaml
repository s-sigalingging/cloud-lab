apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    chart: kube-prometheus-stack
    targetRevision: 69.x.x
    helm:
      values: |
        grafana:
          service:
            type: LoadBalancer
            annotations:
              cloud.google.com/load-balancer-type: "Internal"
        
        # 🌟 THE FINAL SECURITY BYPASS BLOCK
        global:
          rbac:
            create: true      # Forces Helm to build the cluster access keys
            pspEnabled: false  # Disables legacy pod security policies that block GKE
        
        prometheus:
          enabled: true
          prometheusSpec: 
            securityContext:
              runAsGroup: 65534
              runAsUser: 65534
              fsGroup: 65534
          storageSpec:
              emptyDir:
                medium: Memory    
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true

---
# 📡 THE DISCOVERY ENGINE FOR YOUR MICROSERVICES
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: microservices-monitor
  namespace: monitoring
  labels:
    # ⚠️ This exact label tells the Helm deployment to trust and scrape this config
    release: observability-stack 
spec:
  # Targets the namespaces where your apps live (e.g., default, production, etc.)
  namespaceSelector:
    any: true
  # 🎯 Matches any Service in your cluster that has a monitoring-enabled label
  selector:
    matchLabels:
      prometheus.io/scrape: "true"
  endpoints:
  - port: http-metrics  # Named port on your Kubernetes Services
    interval: 15s
    relabelings:
    - sourceLabels: [__meta_kubernetes_service_label_prometheus_io_path]
      action: replace
      targetLabel: __metrics_path__
      regex: (.+)