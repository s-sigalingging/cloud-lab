apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    chart: kube-prometheus-stack
    targetRevision: 69.x.x
    helm:
      values: |
        grafana:
          service:
            type: LoadBalancer
            annotations:
              cloud.google.com/load-balancer-type: "Internal"
        
        # 🌟 THE FINAL SECURITY BYPASS BLOCK
        global:
          rbac:
            create: true      # Forces Helm to build the cluster access keys
            pspEnabled: false  # Disables legacy pod security policies that block GKE
        
        prometheus:
          enabled: true
          prometheusSpec: {}   # Keeps the default statefulset rules active
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true