apiVersion: apps/v1
kind: Deployment
metadata:
  name: onboarding
  namespace: app
  labels:
    app: onboarding
    tier: middle-tier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: onboarding
  template:
    metadata:
      labels:
        app: onboarding
    spec:
      containers:
      - name: onboarding
        image: asia-southeast2-docker.pkg.dev/project-3ad3e57a-ebe0-4fe5-b00/lab-images/banking:latest
        imagePullPolicy: Always
        command: ["/bin/sh", "-c"]
        args:
        - |
          # 1. Inject JSON and Prometheus library components at the very top of the script
          sed -i '1s/^/import json\nfrom prometheus_client import make_wsgi_app\nfrom werkzeug.middleware.dispatcher import DispatcherMiddleware\n/' $APP_SCRIPT;
          
          # 2. Hook the /metrics route natively into Flask's active WSGI middle-tier dispatcher
          sed -i 's/app = Flask(__name__)/app = Flask(__name__)\napp.wsgi_app = DispatcherMiddleware(app.wsgi_app, {"\/metrics": make_wsgi_app()})/' $APP_SCRIPT;
          
          # 3. Fire up the patched Python application
          python3 $APP_SCRIPT;
        resources:
          requests:
            cpu: "20m"       
            memory: "64Mi"   
          limits:
            cpu: "100m"     
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8083
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8083
          initialDelaySeconds: 5
          periodSeconds: 10      
        volumeMounts:
        - name: secrets-store-inline
          mountPath: "/var/secrets"
          readOnly: true
        env:
        - name: APP_SCRIPT
          value: "onboarding.py"
        - name: PORT
          value: "8083"
        ports:
        - containerPort: 8083
          name: api-port
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8083
          initialDelaySeconds: 15
          periodSeconds: 20
      volumes:
      - name: secrets-store-inline
        csi:
          driver: secrets-store-gke.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "app-secrets-provider"

---
apiVersion: v1
kind: Service
metadata:
  name: onboarding
  namespace: app
  labels:
    app: onboarding
    prometheus.io/scrape: "true"
  annotations:
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: http-metrics 
    port: 8083
    targetPort: 8083
    protocol: TCP
  selector:
    app: onboarding

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: onboarding-hpa
  namespace: app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: onboarding
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70