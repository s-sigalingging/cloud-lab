apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-channel
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-channel
  template:
    metadata:
      labels:
        app: frontend-channel
    spec:
      containers:
      - name: frontend
        image: asia-southeast2-docker.pkg.dev/project-3ad3e57a-ebe0-4fe5-b00/lab-images/banking:latest
        imagePullPolicy: Always
        command: ["/bin/sh", "-c"]
        args:
        - |
          # 1. Inject JSON and Prometheus library components at the very top of the script
          sed -i '1s/^/import json\nfrom prometheus_client import make_wsgi_app\nfrom werkzeug.middleware.dispatcher import DispatcherMiddleware\n/' $APP_SCRIPT;
          
          # 2. Hook the /metrics route natively into Flask's active WSGI middle-tier dispatcher
          sed -i 's/app = Flask(__name__)/app = Flask(__name__)\napp.wsgi_app = DispatcherMiddleware(app.wsgi_app, {"\/metrics": make_wsgi_app()})/' $APP_SCRIPT;
          
          # 3. Fire up the patched Python application
          python3 $APP_SCRIPT;
        resources:
          requests:
            cpu: "20m"       
            memory: "64Mi"   
          limits:
            cpu: "100m"     
            memory: "128Mi"  
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10    
        volumeMounts:
        - name: secrets-store-inline
          mountPath: "/var/secrets"
          readOnly: true
        ports:
        - containerPort: 8080
        env:
        - name: APP_SCRIPT
          value: "frontend-channel.py"
        - name: SWITCH_SERVICE_URL
          value: "http://payment-switch-service.app.svc.cluster.local:8081/api/v1/switch/process"
        - name: LEDGER_BALANCE_URL
          value: "http://core-ledger-service.app.svc.cluster.local:8082/ledger/balance"
        - name: PORT
          value: "8080"
      volumes:
      - name: secrets-store-inline
        csi:
          driver: secrets-store-gke.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "app-secrets-provider"

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-channel-service
  namespace: app
  labels:
    app: frontend-channel
    prometheus.io/scrape: "true"
spec:
  type: ClusterIP
  ports:
  - name: http-metrics 
    port: 8080
    targetPort: 8080
    protocol: TCP
  selector:
    app: frontend-channel

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-channel-hpa
  namespace: app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend-channel
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-channel-lb
  namespace: app
  annotations:
    cloud.google.com/load-balancer-type: "Internal"
spec:
  type: LoadBalancer
  loadBalancerIP: "10.50.1.55" 
  selector:
    app: frontend-channel
  ports:
    - protocol: TCP
      port: 80         
      targetPort: 8080