name: Build Python Base Image

on:
  pull_request:
    branches: [main]
    paths: ['base-image/**'] # 🌟 FIX 1: Removed relative path prefix
  push:
    branches: [main]
    paths: ['base-image/**'] # 🌟 FIX 1: Removed relative path prefix
    tags: 
      - 'python-v[0-9]+.[0-9]+.[0-9]+*' # Custom tag pattern matching

env:
  PROJECT_ID: "project-3ad3e57a-ebe0-4fe5-b00" 
  REGISTRY_LOCATION: "asia-southeast2" 
  REGISTRY_URL: "asia-southeast2-docker.pkg.dev/project-3ad3e57a-ebe0-4fe5-b00/lab-images"
  IMAGE_NAME: "banking"      

jobs:
  # 🧪 STAGE 1: Code Linting / Review
  build-test-python:
    name: Test Python Configuration
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Validate Files
        run: echo "Running syntax and dockerfile check validation suites..."

  # 🏗️ STAGE 2: Verification of main push
  build-python:
    name: Verify Main Branch Integration
    if: github.event_name == 'push' && github.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Verify Configurations
        run: echo "Validating branch consistency hooks..."

  # 🚀 STAGE 3: Production Release (Builds and pushes to Google Artifact Registry)
  publish-python:
    name: Package and Publish Image
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🌟 FIX 2: Standard secure handshake block for Google Cloud
      - name: Log in to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          # Authenticates cleanly using standard secret keys we map in repository settings
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      # 🌟 FIX 3: Replaces the dummy echo with a live production Docker Build engine
      - name: Build and Push Docker Base Image
        uses: docker/build-push-action@v5
        with:
          context: ./base-image # Points to the folder containing your Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:base