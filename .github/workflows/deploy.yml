name: Deploy Application

on:
  push:
    branches:
      - main

permissions:
  contents: 'read'
  id-token: 'write' 

env:
  PROJECT_ID: "project-3ad3e57a-ebe0-4fe5-b00" 
  REGISTRY_LOCATION: "asia-southeast2" 
  REGISTRY_URL: "asia-southeast2-docker.pkg.dev/YOUR_GCP_PROJECT_ID/secure-banking-images"
  IMAGE_NAME: "banking-dashboard"

jobs:
  build-and-ship:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/319432675110/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'banking-app-runner@${{ env.PROJECT_ID }}.iam.gserviceaccount.com'

      
      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      
      - name: Build and Push Container
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max