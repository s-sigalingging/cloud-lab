name: Deploy Application

on:
  push:
    branches:
      - main

permissions:
  contents: 'read'
  id-token: 'write' 

env:
  PROJECT_ID: "project-3ad3e57a-ebe0-4fe5-b00" 
  REGISTRY_LOCATION: "asia-southeast2" 
  REGISTRY_URL: "asia-southeast2-docker.pkg.dev/project-3ad3e57a-ebe0-4fe5-b00/lab-images"
  IMAGE_NAME: "banking"

jobs:
  build-and-ship:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/319432675110/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'gitlab-runner@${{ env.PROJECT_ID }}.iam.gserviceaccount.com'

      - name: Set up gcloud CLI & Configure Docker
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY_LOCATION }}-docker.pkg.dev --quiet

      - name: Check Working Directory
        run: |
          ls -lah

      # CONTEXT FIXED: Pointing back to ./app where your code and Dockerfile live together
      - name: Build and Push Container
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Authenticate to GKE
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: 's-shield-core-cluster'
          location: 'asia-southeast2-a'

      - name: Deploy to GKE Cluster
        run: |
          # Apply the entire custom decoupled manifest directory to the 'app' namespace
          kubectl apply -f ./kubernetes-manifest/
          
          # Force rollouts using the freshly minted specific commit SHA image tags for precision tracking
          kubectl set image deployment/frontend-channel frontend=${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -n app
          kubectl set image deployment/payment-switch switch=${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -n app
          kubectl set image deployment/core-ledger ledger=${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -n app
          kubectl set image deployment/onboarding onboarding=${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -n app
          
          # Monitor rollouts until everything transitions to successfully active
          kubectl rollout status deployment/frontend-channel -n app
          kubectl rollout status deployment/payment-switch -n app
          kubectl rollout status deployment/core-ledger -n app
          kubectl rollout status deployment/onboarding -n app